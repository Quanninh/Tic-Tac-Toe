<html>

<body>

<h1>Tic-Tac-Toe</h1>

<button onclick="startGame()">New Game</button>
<button onclick="quitGame()">Quit</button>

<div id="board"></div>

<div id="message"></div>

<script>

const SERVER = "http://localhost:5003";

let board = [0,0,0,0,0,0,0,0,0];
let gameOver = false;

createBoard();

async function startGame() {

    const response = await fetch(`${SERVER}/start`);

    const text = await response.text();

    const lines = text.trim().split(/\r?\n/);

    board =
        lines[1]
            .replace("BOARD:", "")
            .split(",")
            .map(Number);
    
    gameOver = false;

    renderBoard();

    setMessage("Your turn");
}

function createBoard() {

    const boardDiv =
        document.getElementById("board");

    boardDiv.innerHTML = "";

    for (let i = 0; i < 9; i++) {

        const button =
            document.createElement("button");

        button.className = "cell";

        button.onclick = () => makeMove(i);

        boardDiv.appendChild(button);
    }
}

function renderBoard() {

    const cells =
        document.querySelectorAll(".cell");

    for (let i = 0; i < 9; i++) {

        if (board[i] === 1) {
            cells[i].innerHTML = '<span class="x">X</span>';
        }
        else if (board[i] === 2) {
            cells[i].innerHTML = '<span class="o">O</span>';
        }
        else {
            cells[i].innerHTML = "";
        }
    }
}

async function makeMove(index) {
    if(gameOver){
        return;
    }

    const body = (index + 1) + "\nBOARD:" + board.join(",");
    console.log("Sending:");
    console.log(body);

    const response =
        await fetch(`${SERVER}/move`, {
            method: "POST",
            headers: {
            "Content-Type": "text/plain"
        },
            body: body
        });

    const text = await response.text();
    console.log(text);

    if (!response.ok) {
        setMessage(text);
        return;
    }

    const lines = text.split("\n");
    const status = lines[0];

    if (lines.length > 1) {
        board = lines[1]
                    .replace("BOARD:", "")
                    .split(",")
                    .map(Number);

        renderBoard();
    }

    switch (status) {

        case "CONTINUE":
            setMessage("Your turn");
            break;

        case "HUMAN_WIN":
            setMessage("You win!");
            gameOver = true;
            break;

        case "COMPUTER_WIN":
            setMessage("Computer wins!");
            gameOver = true;
            break;

        case "DRAW":
            setMessage("Draw!");
            gameOver = true;
            break;

        case "INVALID":
            setMessage("Invalid move.");
            break;

        case "OCCUPIED":
            setMessage("This cell is occupied.");
            break;
    }
}

async function quitGame() {

    await fetch(`${SERVER}/quit`);
    gameOver = true;
    setMessage("Game ended.");
}

function setMessage(msg) {
    document.getElementById("message")
            .textContent = msg;
}

startGame();

</script>

</body>
</html>
